# Configuración de ejemplo de Jarvis. Copia a config/jarvis_config.yaml y rellena.
# Usa variables de entorno (${VAR}) para los secretos en producción.

user_name: "Álvaro"

llm:
  model: "claude-opus-4-8"   # modelo de Claude para respuestas en lenguaje natural
  # La clave se lee de la variable de entorno ANTHROPIC_API_KEY

market_data:
  polygon_api_key: "${POLYGON_API_KEY}"
  alpaca_api_key: "${ALPACA_API_KEY}"
  alpaca_secret: "${ALPACA_SECRET}"

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

# Reutiliza la sección de ranking del sistema principal
ranking_engine:
  update_interval_full: 300
  weights:
    technical: 0.25
    sentiment: 0.20
    macro: 0.15
    options_flow: 0.15
    ml_prediction: 0.15
    seasonality: 0.05
    volume_profile: 0.03
    correlation: 0.02
  alert_thresholds:
    strong_buy: 75
    buy: 60
    sell: 40
    strong_sell: 25

assets_universe:
  stocks:
    mega_cap: [AAPL, MSFT, GOOGL, AMZN, NVDA, META, TSLA]
  crypto:
    top: [BTC/USD, ETH/USD]
