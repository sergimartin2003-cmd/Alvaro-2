# Configuración de ejemplo. Copia a config.yaml y rellena.
# En producción usa variables de entorno para los secretos.

portfolio_value: 100000          # USD
max_risk_per_trade: 0.02         # 2% por trade
max_total_exposure: 0.20         # 20% del portfolio

kafka:
  bootstrap_servers: ["localhost:9092"]

redis:
  host: localhost
  port: 6379
  db: 0

market_data:
  polygon_api_key: "${POLYGON_API_KEY}"
  alpaca_api_key: "${ALPACA_API_KEY}"
  alpaca_secret: "${ALPACA_SECRET}"
  data_url: "wss://stream.data.alpaca.markets/v2/sip"

twitter:
  api_key: "${TWITTER_API_KEY}"
  api_secret: "${TWITTER_API_SECRET}"
  access_token: "${TWITTER_ACCESS_TOKEN}"
  access_secret: "${TWITTER_ACCESS_SECRET}"
  political_accounts:
    - "25073877"          # realDonaldTrump
    - "822215679726100480"  # POTUS

symbols: ["AAPL", "MSFT", "TSLA", "SPY", "QQQ", "BTC/USD"]

# Motor de ranking en tiempo real
ranking_engine:
  update_interval_full: 300   # análisis completo cada 5 min
  update_interval_top10: 30   # refresco del top 10 cada 30 s
  weights:                    # deben sumar ~1.0 (se normalizan igualmente)
    technical: 0.25
    sentiment: 0.20
    macro: 0.15
    options_flow: 0.15
    ml_prediction: 0.15
    seasonality: 0.05
    volume_profile: 0.03
    correlation: 0.02
  alert_thresholds:
    strong_buy: 75
    buy: 60
    sell: 40
    strong_sell: 25
    score_change: 10

# Universo de activos a monitorear
assets_universe:
  stocks:
    mega_cap: [AAPL, MSFT, GOOGL, AMZN, NVDA, META, TSLA, JPM, V]
    high_growth: [AMD, CRM, NFLX, ADBE, INTC, ORCL, QCOM]
  forex:
    majors: [EUR/USD, GBP/USD, USD/JPY, AUD/USD, USD/CAD]
  crypto:
    top: [BTC/USD, ETH/USD, SOL/USD, XRP/USD]
  commodities:
    metals: [XAU/USD, XAG/USD]
    energy: [CL/USD, NG/USD]
  indices:
    us: [SPX, NDX, DJI, RUT, VIX]

dashboard:
  host: 0.0.0.0
  port: 8050
  refresh_interval: 30

alerts:
  default_channels: ["slack"]
  max_alerts_per_hour: 10
  smtp:
    server: smtp.gmail.com
    port: 587
    username: "${SMTP_USER}"
    password: "${SMTP_PASS}"
    from_email: "alerts@example.com"
    to_email: "me@example.com"
  twilio:
    account_sid: "${TWILIO_SID}"
    auth_token: "${TWILIO_TOKEN}"
    from_number: "+10000000000"
    to_number: "+10000000001"
  slack:
    webhook_url: "${SLACK_WEBHOOK_URL}"
  discord:
    webhook_url: "${DISCORD_WEBHOOK_URL}"
  telegram:
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
